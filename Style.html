<style>
  :root {
    --bg: #f5f7fb;
    --surface: #ffffff;
    --surface-2: #eef4f8;
    --ink: #18202a;
    --muted: #677383;
    --line: #d9e1ea;
    --primary: #176b87;
    --primary-2: #0f596f;
    --teal: #0f9f8f;
    --green: #2a9d55;
    --orange: #e48b29;
    --red: #c94c4c;
    --blue: #3178c6;
    --violet: #6a5acd;
    --shadow: 0 16px 42px rgba(22, 35, 50, 0.10);
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    letter-spacing: 0;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app-shell {
    display: grid;
    grid-template-columns: 250px minmax(0, 1fr);
    min-height: 100vh;
  }

  .sidebar {
    background: #132332;
    color: #fff;
    padding: 18px 14px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .brand-block {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }

  .brand-mark {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: var(--radius);
    color: #102030;
    font-weight: 800;
    background: linear-gradient(135deg, #d6f6ed, #ffc96b);
  }

  .brand-block h1 {
    margin: 0;
    font-size: 18px;
    line-height: 1.1;
  }

  .brand-block p {
    margin: 3px 0 0;
    color: rgba(255,255,255,0.72);
  }

  .nav-list {
    display: grid;
    gap: 6px;
    margin-top: 18px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 0;
    border-radius: var(--radius);
    background: transparent;
    color: rgba(255,255,255,0.76);
    text-align: left;
    padding: 11px 12px;
    min-height: 42px;
  }

  .nav-item span {
    width: 20px;
    text-align: center;
  }

  .nav-item.active,
  .nav-item:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .main-content {
    padding: 22px;
    min-width: 0;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 18px;
  }

  .topbar h2 {
    margin: 0;
    font-size: 25px;
  }

  .topbar p {
    margin: 5px 0 0;
    color: var(--muted);
  }

  .topbar-actions,
  .toolbar,
  .form-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .primary-btn,
  .secondary-btn,
  .danger-btn,
  .icon-btn {
    border: 0;
    border-radius: var(--radius);
    min-height: 38px;
    padding: 9px 13px;
    font-weight: 650;
    white-space: nowrap;
  }

  .primary-btn {
    color: #fff;
    background: var(--primary);
  }

  .primary-btn:hover {
    background: var(--primary-2);
  }

  .secondary-btn {
    color: var(--primary-2);
    background: #e6f1f4;
  }

  .danger-btn {
    color: #fff;
    background: var(--red);
  }

  .icon-btn {
    width: 38px;
    padding: 0;
    background: #eef2f6;
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }

  .metric-card,
  .panel,
  .aura-panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .metric-card {
    padding: 16px;
    border-left: 5px solid var(--primary);
  }

  .metric-card.accent-green {
    border-left-color: var(--green);
  }

  .metric-card.accent-orange {
    border-left-color: var(--orange);
  }

  .metric-card.accent-blue {
    border-left-color: var(--blue);
  }

  .metric-card span,
  .metric-card small {
    color: var(--muted);
  }

  .metric-card strong {
    display: block;
    margin: 6px 0;
    font-size: 36px;
    line-height: 1;
  }

  .two-column {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
    gap: 16px;
    margin-bottom: 16px;
  }

  .panel {
    padding: 16px;
    margin-bottom: 16px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .panel-header h3 {
    margin: 0;
    font-size: 17px;
  }

  .panel-header span {
    color: var(--muted);
    font-size: 13px;
  }

  .toolbar {
    margin-bottom: 16px;
  }

  input,
  select,
  textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: var(--ink);
    min-height: 38px;
    padding: 8px 10px;
  }

  textarea {
    resize: vertical;
  }

  label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-weight: 620;
  }

  .toolbar input,
  .toolbar select {
    max-width: 280px;
  }

  .table-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 720px;
  }

  th,
  td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: middle;
  }

  th {
    background: #eef4f8;
    color: #334152;
    font-size: 13px;
  }

  tr:last-child td {
    border-bottom: 0;
  }

  .row-actions {
    display: flex;
    gap: 8px;
  }

  .row-actions button {
    min-height: 32px;
    padding: 6px 9px;
    border-radius: 7px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 12px;
    font-weight: 700;
  }

  .badge.level-0 {
    color: #5f6873;
    background: #eef1f4;
  }

  .badge.level-1 {
    color: #8a4e00;
    background: #fff0d9;
  }

  .badge.level-2 {
    color: #0b6a4d;
    background: #dff8ee;
  }

  .skill-summary-list,
  .class-counts {
    display: grid;
    gap: 12px;
  }

  .summary-row,
  .class-row {
    display: grid;
    grid-template-columns: 120px minmax(0, 1fr) 54px;
    align-items: center;
    gap: 10px;
  }

  .bar-track,
  .progress-line {
    height: 12px;
    background: #e8edf2;
    border-radius: 999px;
    overflow: hidden;
  }

  .bar-fill,
  .progress-line span {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    border-radius: 999px;
  }

  .development-text,
  .muted-text {
    color: var(--muted);
    line-height: 1.55;
  }

  .profile-layout {
    display: grid;
    grid-template-columns: minmax(560px, 1fr) 360px;
    gap: 16px;
    align-items: start;
  }

  .aura-panel {
    padding: 0;
    overflow: hidden;
    min-height: 780px;
  }

  .student-aura {
    position: relative;
    min-height: 780px;
    background:
      linear-gradient(135deg, rgba(13, 52, 71, 0.96), rgba(20, 36, 61, 0.98) 55%, rgba(72, 48, 95, 0.94)),
      #123;
    color: #fff;
    overflow: hidden;
  }

  .aura-grid {
    position: absolute;
    inset: 28px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
  }

  .aura-ring {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.20);
  }

  .aura-ring.r1 {
    width: 340px;
    height: 340px;
  }

  .aura-ring.r2 {
    width: 520px;
    height: 520px;
    border-style: dashed;
    border-color: rgba(55, 217, 194, 0.35);
  }

  .aura-ring.r3 {
    width: 680px;
    height: 680px;
    border-color: rgba(255,255,255,0.12);
  }

  .student-core {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    place-items: center;
    text-align: center;
    gap: 8px;
  }

  .avatar-circle {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #f8d16c, #42d3bc 48%, #6a8fe8);
    color: #102030;
    border: 5px solid rgba(255,255,255,0.95);
    box-shadow: 0 20px 50px rgba(39, 210, 194, 0.32);
    font-size: 30px;
    font-weight: 900;
  }

  .student-core h3 {
    margin: 0;
    font-size: 17px;
    max-width: 270px;
  }

  .student-core p {
    margin: 0;
    color: #7de7dc;
    font-weight: 750;
  }

  .skill-node {
    position: absolute;
    width: 98px;
    min-height: 94px;
    transform: translate(-50%, -50%);
    text-align: center;
    display: grid;
    justify-items: center;
    gap: 4px;
    padding: 7px;
    border-radius: var(--radius);
    background: rgba(8, 18, 30, 0.52);
    border: 1px solid rgba(255,255,255,0.14);
    overflow: hidden;
  }

  .skill-node::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, currentColor 0 12%, transparent 13% 100%);
    opacity: 0.14;
    filter: blur(2px);
    z-index: -1;
  }

  .skill-node::after {
    content: "";
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 1px dashed currentColor;
    opacity: 0.22;
    z-index: -1;
  }

  .skill-gem {
    position: relative;
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 10px;
    transform: rotate(45deg);
  }

  .skill-gem span {
    transform: rotate(-45deg);
    font-weight: 900;
    font-size: 12px;
  }

  .skill-gem::before,
  .skill-gem::after {
    content: "";
    position: absolute;
    inset: -5px;
    border: 2px solid currentColor;
    border-radius: 12px;
    opacity: 0.25;
  }

  .skill-gem::after {
    inset: -10px;
    opacity: 0;
  }

  .skill-node.level-0 .skill-gem {
    color: #d0d5dc;
    background: linear-gradient(135deg, #5d6570, #343c47);
  }

  .skill-node.level-1 .skill-gem {
    color: #ffd18a;
    background: linear-gradient(135deg, #ffb84c, #8c5f16);
    box-shadow: 0 0 18px rgba(255, 184, 76, 0.35);
  }

  .skill-node.level-1 .skill-gem::after {
    opacity: 0.18;
  }

  .skill-node.level-2 .skill-gem {
    color: #9fffee;
    background: linear-gradient(135deg, #40e0c2, #2376d2 52%, #7257cf);
    box-shadow: 0 0 26px rgba(64, 224, 194, 0.55), 0 0 54px rgba(114, 87, 207, 0.26);
  }

  .skill-node.level-2 .skill-gem::before {
    opacity: 0.5;
  }

  .skill-node.level-2 .skill-gem::after {
    opacity: 0.34;
  }

  .skill-node strong {
    color: #fff;
    font-size: 11px;
    line-height: 1.12;
    max-width: 86px;
  }

  .skill-node em {
    color: rgba(255,255,255,0.62);
    font-style: normal;
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .skill-node small {
    color: rgba(255,255,255,0.72);
    line-height: 1.25;
    font-size: 9px;
  }

  .profile-conclusion {
    display: grid;
    gap: 10px;
  }

  .profile-conclusion-card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fbfdfd;
    padding: 10px;
  }

  .profile-conclusion-card strong {
    display: block;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .profile-conclusion-card p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .profile-side {
    display: grid;
    gap: 16px;
  }

  .info-list {
    display: grid;
    gap: 9px;
  }

  .info-row {
    display: grid;
    grid-template-columns: 95px minmax(0, 1fr);
    gap: 10px;
  }

  .info-row span {
    color: var(--muted);
  }

  .chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 7px 10px;
    background: #e9f7f4;
    color: #0b6a4d;
    font-weight: 700;
    font-size: 13px;
  }

  .skill-power-chip.level-0 {
    background: #eef1f4;
    color: #536170;
  }

  .skill-power-chip.level-1 {
    background: #fff4dc;
    color: #8b5d12;
  }

  .skill-power-chip.level-2 {
    background: #e4fbf7;
    color: #087060;
  }

  .assessment-form,
  .settings-form {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }

  .settings-form {
    grid-template-columns: minmax(0, 1fr);
    max-width: 760px;
  }

  .wide-field {
    grid-column: 1 / -1;
  }

  .is-hidden {
    display: none !important;
  }

  .reading-level-board {
    border: 1px solid #c8e7dc;
    border-radius: var(--radius);
    padding: 14px;
    background:
      linear-gradient(135deg, rgba(232, 248, 241, 0.92), rgba(248, 252, 255, 0.96)),
      #f6fbf9;
  }

  .comment-scale-board {
    border: 1px solid #d7e1ec;
    border-radius: var(--radius);
    padding: 14px;
    background: #f8fbfd;
  }

  .comment-scale-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .comment-scale-field {
    border: 1px solid var(--line);
    border-left: 6px solid var(--scale-color, #65758b);
    border-radius: var(--radius);
    padding: 12px;
    background: #fff;
    font-weight: 800;
    color: var(--ink);
  }

  .comment-scale-field textarea {
    margin-top: 8px;
    min-height: 96px;
    resize: vertical;
  }

  .comment-scale-field.scale-3 {
    --scale-color: #0f766e;
  }

  .comment-scale-field.scale-2 {
    --scale-color: #b7791f;
  }

  .comment-scale-field.scale-1 {
    --scale-color: #b91c1c;
  }

  .comment-conclusion-preview {
    margin-top: 12px;
    border-radius: var(--radius);
    padding: 10px 12px;
    background: #edf7f4;
    color: #0b5b47;
    font-size: 13px;
    line-height: 1.45;
  }

  .reading-board-heading {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .reading-board-heading strong {
    display: block;
    color: #0b5b47;
    font-size: 15px;
  }

  .reading-board-heading p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .reading-board-heading span {
    flex: 0 0 auto;
    border-radius: 999px;
    padding: 6px 10px;
    background: #ffffff;
    color: #0f766e;
    font-size: 12px;
    font-weight: 800;
    box-shadow: 0 8px 20px rgba(15, 118, 110, 0.12);
  }

  .reading-level-options {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .reading-level-card {
    position: relative;
    min-height: 150px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 13px;
    background: #fff;
    text-align: left;
    cursor: pointer;
    transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
  }

  .reading-level-card:hover,
  .reading-level-card.active {
    transform: translateY(-2px);
    border-color: var(--level-color, #0f766e);
    box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
  }

  .reading-level-card::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 6px;
    border-radius: var(--radius) 0 0 var(--radius);
    background: var(--level-color, #0f766e);
  }

  .reading-level-card strong,
  .reading-level-card span,
  .reading-level-card small {
    display: block;
    padding-left: 4px;
  }

  .reading-level-card strong {
    color: var(--level-color, #0f766e);
    font-size: 15px;
  }

  .reading-level-card span {
    margin-top: 5px;
    color: var(--ink);
    font-weight: 800;
    font-size: 13px;
  }

  .reading-level-card small {
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .assessment-history {
    display: grid;
    gap: 10px;
  }

  .history-item {
    display: grid;
    grid-template-columns: minmax(150px, 0.7fr) 150px 90px minmax(0, 1.2fr) auto;
    gap: 12px;
    align-items: center;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
  }

  .report-output {
    display: grid;
    gap: 16px;
  }

  .report-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
  }

  .empty-state {
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 28px;
    text-align: center;
    color: var(--muted);
    background: #fbfdff;
  }

  .modal {
    width: min(520px, calc(100vw - 24px));
    border: 0;
    border-radius: var(--radius);
    padding: 0;
    box-shadow: var(--shadow);
  }

  .modal::backdrop {
    background: rgba(13, 24, 35, 0.42);
  }

  .modal form {
    display: grid;
    gap: 14px;
    padding: 18px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h3 {
    margin: 0;
  }

  .toast {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 1000;
    max-width: min(440px, calc(100vw - 36px));
    background: #12202e;
    color: #fff;
    padding: 12px 14px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transform: translateY(-80px);
    opacity: 0;
    transition: transform 160ms ease, opacity 160ms ease;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.error {
    background: #8f2f2f;
  }

  .loading {
    opacity: 0.58;
    pointer-events: none;
  }

  @media (max-width: 1050px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: static;
      height: auto;
    }

    .nav-list {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .metric-grid,
    .two-column,
    .profile-layout,
    .assessment-form,
    .reading-level-options,
    .comment-scale-grid {
      grid-template-columns: 1fr;
    }

    .profile-side {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    .main-content {
      padding: 14px;
    }

    .topbar {
      display: grid;
    }

    .nav-list {
      grid-template-columns: 1fr 1fr;
    }

    .metric-grid {
      grid-template-columns: 1fr 1fr;
    }

    .student-aura {
      min-height: 920px;
    }

    .skill-node {
      width: 92px;
      min-height: 88px;
    }

    .history-item {
      grid-template-columns: 1fr;
    }
  }

  @media print {
    .sidebar,
    .topbar-actions,
    .toolbar,
    .form-actions,
    .nav-list,
    .toast {
      display: none !important;
    }

    .app-shell {
      display: block;
    }

    .main-content {
      padding: 0;
    }

    .view {
      display: none !important;
    }

    .view.active {
      display: block !important;
    }

    .panel,
    .metric-card,
    .aura-panel,
    .report-card {
      box-shadow: none;
      break-inside: avoid;
    }
  }
</style>
